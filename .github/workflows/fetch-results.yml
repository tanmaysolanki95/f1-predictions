name: Fetch F1 Results & Score Predictions

on:
  schedule:
    # Runs every Sunday at 18:00 UTC (after most race finishes)
    - cron: "0 18 * * 0"
    # Runs every Saturday at 16:00 UTC (after sprint races)
    - cron: "0 16 * * 6"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (default: current)"
        required: false
        default: "current"
      round:
        description: "Round number (default: last)"
        required: false
        default: "last"

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch results and compute scores
        run: npx tsx scripts/fetch-and-score.ts
        env:
          SEASON: ${{ github.event.inputs.season || 'current' }}
          ROUND: ${{ github.event.inputs.round || 'last' }}
